  <text x="352" y="20" text-anchor="middle" font-size="9" fill="#3CD278" font-family="monospace">SHOP</text>
  <text x="32" y="12" text-anchor="middle" font-size="7" fill="#646478" font-family="monospace">lit</text>
  <text x="96" y="12" text-anchor="middle" font-size="7" fill="#404050" font-family="monospace">dim</text>
  <text x="160" y="12" text-anchor="middle" font-size="7" fill="#646478" font-family="monospace">lit</text>
