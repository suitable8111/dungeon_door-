  <text x="160" y="20" text-anchor="middle" font-size="9" fill="#A0A0B4" font-family="monospace">FLOOR</text>
  <text x="224" y="20" text-anchor="middle" font-size="9" fill="#505064" font-family="monospace">FLOOR</text>
