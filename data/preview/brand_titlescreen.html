<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; font-family: var(--font-body); }
.bg { width: 700px; height: 394px; position: relative; overflow: hidden; }
.bg img { width: 100%; height: 100%; object-fit: cover; }
.overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.5) 100%); }
</style>
</head><body>
<div class="bg">
  <img src="../assets/title_background.svg" alt="BitCrawler Title Background">
  <div class="overlay"></div>
</div>
</body></html>
