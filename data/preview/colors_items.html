<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--ui-bg); font-family: var(--font-body); padding: 16px; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .chip { width: 52px; height: 36px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.08); }
  .label { font-size: 9px; color: var(--color-light-gray); text-align: center; width: 56px; line-height: 1.3; }
  .hex { font-size: 8px; color: var(--color-gray); font-family: monospace; }
  .group-title { font-size: 11px; color: var(--gold-color); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; margin-top: 4px; }
  .enemy-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .enemy { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .enemy-chip { width: 36px; height: 36px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.12); position: relative; }
  .enemy-name { font-size: 9px; color: var(--color-light-gray); text-align: center; width: 44px; }
</style>
</head><body>

<div class="group-title">Item Type Colors</div>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#D23C3C;"></div><div class="label">Potion (small)</div><div class="hex">#D23C3C</div></div>
  <div class="swatch"><div class="chip" style="background:#E65050;"></div><div class="label">Potion (large)</div><div class="hex">#E65050</div></div>
  <div class="swatch"><div class="chip" style="background:#B464DC;"></div><div class="label">Scroll / Magic</div><div class="hex">#B464DC</div></div>
  <div class="swatch"><div class="chip" style="background:#DCDC32;"></div><div class="label">Amulet</div><div class="hex">#DCDC32</div></div>
  <div class="swatch"><div class="chip" style="background:#FFD232;"></div><div class="label">Whirlwind</div><div class="hex">#FFD232</div></div>
  <div class="swatch" style="margin-left:10px"><div class="chip" style="background:#B4B9CD;"></div><div class="label">Dagger</div><div class="hex">#B4B9CD</div></div>
  <div class="swatch"><div class="chip" style="background:#CDD2E6;"></div><div class="label">Sword</div><div class="hex">#CDD2E6</div></div>
  <div class="swatch" style="margin-left:10px"><div class="chip" style="background:#A07846;"></div><div class="label">Leather</div><div class="hex">#A07846</div></div>
  <div class="swatch"><div class="chip" style="background:#A0A5B9;"></div><div class="label">Chainmail</div><div class="hex">#A0A5B9</div></div>
  <div class="swatch"><div class="chip" style="background:#C8CDD7;"></div><div class="label">Plate</div><div class="hex">#C8CDD7</div></div>
</div>

<div class="group-title">Enemy Colors</div>
<div class="enemy-row">
  <div class="enemy"><div class="enemy-chip" style="background:#A06E3C;"></div><div class="enemy-name">Rat 쥐</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#50A046;"></div><div class="enemy-name">Goblin 고블린</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#C8C8AF;"></div><div class="enemy-name">Skeleton 스켈레톤</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#649150;"></div><div class="enemy-name">Orc 오크</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#467846;"></div><div class="enemy-name">Troll 트롤</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#8246D2;"></div><div class="enemy-name">Wizard 마법사</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#B43C14;"></div><div class="enemy-name">Dragon 드래곤</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#503C78; border:1px solid #C850DC;"></div><div class="enemy-name">Dark Knight</div></div>
  <div class="enemy"><div class="enemy-chip" style="background:#78C8A0; border:1px solid #C850DC;"></div><div class="enemy-name">Lich 리치</div></div>
</div>
</body></html>
