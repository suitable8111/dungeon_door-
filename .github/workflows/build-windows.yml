name: Build Windows (game.exe)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame-ce pyinstaller pillow

      - name: Show environment info
        run: |
          python --version
          pip show pyinstaller pygame-ce pillow
          dir assets\steam

      - name: Convert PNG icon to ICO
        run: |
          python -c "
          from PIL import Image
          sizes = [256, 128, 64, 48, 32, 16]
          src = Image.open('assets/steam/icon_512.png').convert('RGBA')
          imgs = [src.resize((s, s), Image.LANCZOS) for s in sizes]
          imgs[0].save('assets/steam/icon.ico', format='ICO', append_images=imgs[1:])
          print('icon.ico generated OK')
          "

      - name: Build with PyInstaller
        run: |
          pyinstaller game.spec --clean --noconfirm --log-level WARN

      - name: Verify build
        run: |
          dir dist\DungeonDoor
          if exist dist\DungeonDoor\game.exe (echo "game.exe OK") else (echo "FAIL" & exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DungeonDoor-Windows
          path: dist/DungeonDoor/
          retention-days: 30

      - name: Zip for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          Compress-Archive -Path dist\DungeonDoor\* -DestinationPath DungeonDoor-${{ github.ref_name }}.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DungeonDoor-${{ github.ref_name }}.zip
          generate_release_notes: true
