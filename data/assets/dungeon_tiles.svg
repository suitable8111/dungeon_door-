    <rect x="6" y="10" width="24" height="18" rx="1" fill="none" stroke="#2A2A3A" stroke-width="0.5"></rect>
    <rect x="34" y="10" width="24" height="18" rx="1" fill="none" stroke="#2A2A3A" stroke-width="0.5"></rect>
    <rect x="6" y="32" width="24" height="18" rx="1" fill="none" stroke="#2A2A3A" stroke-width="0.5"></rect>
