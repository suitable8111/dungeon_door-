  <g transform="translate(320, 32)">
    <rect width="64" height="64" fill="#152814"></rect>
    <rect width="64" height="64" fill="none" stroke="#3CD278" stroke-width="1.5"></rect>
    
    
    <rect x="10" y="36" width="44" height="20" rx="2" fill="#1E3A18"></rect>
    <rect x="10" y="36" width="44" height="4" rx="2" fill="#2A5020"></rect>
    
    <path d="M6 20 L58 20 L54 32 L10 32Z" fill="#2A4818"></path>
