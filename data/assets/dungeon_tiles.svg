<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 128" width="384" height="128">
  <defs>
    <radialGradient id="wallGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#6A6A88"></stop>
      <stop offset="100%" stop-color="#2E2E46"></stop>
    </radialGradient>
    <radialGradient id="floorGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3A3A52"></stop>
      <stop offset="100%" stop-color="#1A1A28"></stop>
    </radialGradient>
    <radialGradient id="stairsGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#F0D070"></stop>
      <stop offset="100%" stop-color="#806010"></stop>
    </radialGradient>
    <pattern id="stonePat" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#38384E"></rect>
      <path d="M0 8 L8 8 L8 16" stroke="#282838" stroke-width="0.5" fill="none"></path>
      <path d="M8 0 L16 0 L16 8" stroke="#282838" stroke-width="0.5" fill="none"></path>
    </pattern>
    <pattern id="floorPat" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#2D2D3E"></rect>
      <rect x="0" y="0" width="32" height="32" fill="none" stroke="#3A3A4E" stroke-width="1"></rect>
    </pattern>
    <filter id="tileShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.4"></feDropShadow>
    </filter>
    <filter id="tileGlow">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <g transform="translate(0, 32)">
    
    <rect width="64" height="64" fill="url(#stonePat)"></rect>
    <rect width="64" height="64" fill="#46465C" opacity="0.6"></rect>
    
    <rect width="64" height="8" fill="#64647D"></rect>
    
    <rect width="4" height="64" fill="#525270"></rect>
    
    <rect x="6" y="10" width="24" height="18" rx="1" fill="#484860" stroke="#3A3A54" stroke-width="0.5"></rect>
    <rect x="34" y="10" width="24" height="18" rx="1" fill="#484860" stroke="#3A3A54" stroke-width="0.5"></rect>
    <rect x="6" y="32" width="24" height="18" rx="1" fill="#424258" stroke="#363650" stroke-width="0.5"></rect>
    <rect x="34" y="32" width="24" height="18" rx="1" fill="#424258" stroke="#363650" stroke-width="0.5"></rect>
    
