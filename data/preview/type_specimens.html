<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background: var(--ui-bg); font-family: var(--font-body); padding: 16px; }
  .group-title { font-size: 11px; color: var(--gold-color); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; margin-top: 4px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .block { display: flex; flex-direction: column; gap: 6px; }
  .specimen { padding: 8px 10px; border-radius: 2px; }
  .label { font-size: 9px; color: var(--color-gray); text-transform: uppercase; letter-spacing: 0.08em; }
  .spec-title { background: #05050C; border: 2px solid #41415F; }
  .spec-hud   { background: #0A0A14; border: 1px solid #41415F; }
  .spec-section { background: #16162A; border-bottom: 1px solid #373755; }
</style>
</head><body>

<div class="group-title">Context Specimens</div>
<div class="grid">

  <div class="block">
    <div class="label">Main Menu Title</div>
    <div class="specimen spec-title" style="text-align:center; padding:14px 12px;">
      <span style="font-family:'Press Start 2P',monospace;font-size:22px;color:#EBB93C;letter-spacing:0.12em;line-height:1.3;">DUNGEON</span>
      <span style="font-family:'Press Start 2P',monospace;font-size:22px;color:#FFD769;margin-left:10px;letter-spacing:0.12em;line-height:1.3;">DOOR</span>
    </div>
  </div>

  <div class="block">
    <div class="label">Section Headers (HUD)</div>
    <div class="specimen spec-section" style="padding:4px 8px;">
      <span style="font-size:11px;color:#A0A0B4;text-transform:uppercase;letter-spacing:0.1em;">HP</span>
    </div>
    <div class="specimen spec-section" style="padding:4px 8px;">
      <span style="font-size:11px;color:#A0A0B4;text-transform:uppercase;letter-spacing:0.1em;">인벤토리  [1-5]</span>
    </div>
    <div class="specimen spec-section" style="padding:4px 8px;">
      <span style="font-size:11px;color:#A0A0B4;text-transform:uppercase;letter-spacing:0.1em;">스킬  [Q/E/F]</span>
    </div>
  </div>

  <div class="block">
    <div class="label">Menu Button Labels</div>
    <div class="specimen spec-hud" style="border-radius:4px;padding:10px 16px;">
      <span style="font-size:13px;color:#EBB93C;font-weight:500;">▶ 새  게  임</span>
    </div>
    <div class="specimen spec-hud" style="border-radius:4px;padding:10px 16px;border-color:#2E2C46;">
      <span style="font-size:13px;color:#A0A0B4;">이어하기</span>
    </div>
    <div class="specimen" style="background:#120A0A;border:1px solid #501E1E;border-radius:4px;padding:10px 16px;">
      <span style="font-size:13px;color:#823C3C;">종료</span>
    </div>
  </div>

  <div class="block">
    <div class="label">In-game stat labels</div>
    <div class="specimen spec-hud">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
        <span style="color:#646478;">ATK</span><span style="color:#ffffff;">7</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
        <span style="color:#646478;">DEF</span><span style="color:#82B4FF;">3</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;">
        <span style="color:#646478;">GOLD</span><span style="color:#EBB93C;">42 G</span>
      </div>
    </div>
  </div>

  <div class="block" style="grid-column:1/-1;">
    <div class="label">Press Start 2P — Full Alphabet</div>
    <div style="font-family:'Press Start 2P',monospace;font-size:11px;color:#505064;line-height:2.2;letter-spacing:0.06em;background:#05050C;padding:10px;border:1px solid #1E1E30;">
      ABCDEFGHIJKLMNOPQRSTUVWXYZ<br>
      0123456789  !?★☆◆▶◀▲▼·/\-+=%@#
    </div>
  </div>

</div>
</body></html>
